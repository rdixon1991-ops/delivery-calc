<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Profit Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl border border-gray-700 p-6 space-y-6">
        
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-2xl font-black tracking-tight text-white">PROFIT DECISION TOOL</h1>
            <p class="text-gray-400 text-sm">Calculate viability in seconds</p>
        </div>

        <hr class="border-gray-700">

        <!-- Constants (Saved to Local Storage) -->
        <div class="grid grid-cols-2 gap-4 bg-gray-850 p-3 rounded-xl border border-gray-750">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase">Gas Cost ($/KM)</label>
                <input type="number" id="gasCost" step="0.01" value="0.14" class="w-full bg-transparent text-lg font-bold text-white focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-1">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase">Target ($/KM)</label>
                <input type="number" id="targetPay" step="0.10" value="1.50" class="w-full bg-transparent text-lg font-bold text-white focus:outline-none focus:ring-1 focus:ring-emerald-500 rounded px-1">
            </div>
        </div>

        <!-- Inputs -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Uber Offer ($)</label>
                <input type="number" id="uberOffer" placeholder="e.g. 11.00" step="0.50" class="w-full bg-gray-950 border border-gray-700 rounded-lg py-3 px-4 text-xl font-bold text-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Trip Distance (KM)</label>
                <input type="number" id="tripDistance" placeholder="e.g. 6" step="0.1" class="w-full bg-gray-950 border border-gray-700 rounded-lg py-3 px-4 text-xl font-bold text-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>

            <!-- Dead Miles Toggle -->
            <div class="flex items-center justify-between bg-gray-750 p-3 rounded-lg border border-gray-700">
                <span class="text-sm font-medium text-gray-300">Requires empty return trip?</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="deadMiles" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
                </label>
            </div>
        </div>

        <!-- Output & Decision Badge -->
        <div id="decisionBox" class="p-5 rounded-xl border text-center transition-all duration-200 bg-gray-950 border-gray-700">
            <span class="block text-xs font-semibold text-gray-400 uppercase tracking-widest">DECISION</span>
            <div id="decisionText" class="text-3xl font-black my-1 text-gray-500">ENTER DATA</div>
            
            <div class="grid grid-cols-2 gap-2 mt-4 text-left text-xs text-gray-400">
                <div>Est. Gas Cost: <span id="estGas" class="font-bold text-white">$0.00</span></div>
                <div>Est. Net Profit: <span id="netProfit" class="font-bold text-white">$0.00</span></div>
                <div class="col-span-2 mt-1 pt-1 border-t border-gray-800">Net Pay per KM: <span id="payPerKm" class="font-bold text-white">$0.00/KM</span></div>
            </div>
        </div>

    </div>

    <script>
        // DOM Elements
        const gasCostInput = document.getElementById('gasCost');
        const targetPayInput = document.getElementById('targetPay');
        const uberOfferInput = document.getElementById('uberOffer');
        const tripDistanceInput = document.getElementById('tripDistance');
        const deadMilesInput = document.getElementById('deadMiles');
        
        const decisionBox = document.getElementById('decisionBox');
        const decisionText = document.getElementById('decisionText');
        const estGasSpan = document.getElementById('estGas');
        const netProfitSpan = document.getElementById('netProfit');
        const payPerKmSpan = document.getElementById('payPerKm');

        // Load saved values
        if (localStorage.getItem('gasCost')) gasCostInput.value = localStorage.getItem('gasCost');
        if (localStorage.getItem('targetPay')) targetPayInput.value = localStorage.getItem('targetPay');

        function calculate() {
            const gasCost = parseFloat(gasCostInput.value) || 0;
            const targetPay = parseFloat(targetPayInput.value) || 0;
            const uberOffer = parseFloat(uberOfferInput.value) || 0;
            const tripDistance = parseFloat(tripDistanceInput.value) || 0;
            const deadMilesMultiplier = deadMilesInput.checked ? 2 : 1;

            // Save settings
            localStorage.setItem('gasCost', gasCost);
            localStorage.setItem('targetPay', targetPay);

            if (uberOffer <= 0 || tripDistance <= 0) {
                decisionText.innerText = "ENTER DATA";
                decisionText.className = "text-3xl font-black my-1 text-gray-500";
                decisionBox.className = "p-5 rounded-xl border text-center transition-all duration-200 bg-gray-950 border-gray-700";
                estGasSpan.innerText = "$0.00";
                netProfitSpan.innerText = "$0.00";
                payPerKmSpan.innerText = "$0.00/KM";
                return;
            }

            // Math
            const estGas = tripDistance * gasCost * deadMilesMultiplier;
            const netProfit = uberOffer - estGas;
            const payPerKm = tripDistance > 0 ? (netProfit / tripDistance) : 0;

            // Update UI Card Values
            estGasSpan.innerText = `$${estGas.toFixed(2)}`;
            netProfitSpan.innerText = `$${netProfit.toFixed(2)}`;
            payPerKmSpan.innerText = `$${payPerKm.toFixed(2)}/KM`;

            // Make Decision
            if (payPerKm >= targetPay) {
                decisionText.innerText = "🟢 ACCEPT";
                decisionText.className = "text-3xl font-black my-1 text-emerald-400";
                decisionBox.className = "p-5 rounded-xl border text-center transition-all duration-200 bg-emerald-950/30 border-emerald-500/50";
            } else {
                decisionText.innerText = "🔴 DECLINE";
                decisionText.className = "text-3xl font-black my-1 text-rose-400";
                decisionBox.className = "p-5 rounded-xl border text-center transition-all duration-200 bg-rose-950/30 border-rose-500/50";
            }
        }

        // Event Listeners
        [gasCostInput, targetPayInput, uberOfferInput, tripDistanceInput, deadMilesInput].forEach(element => {
            element.addEventListener('input', calculate);
        });
    </script>
</body>
</html>
