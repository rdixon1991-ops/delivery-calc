<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrie Delivery Calculator</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-title" content="Delivery Calc">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4 pb-10 font-sans">

    <div class="w-full max-w-md bg-gray-850 rounded-2xl shadow-xl border border-gray-700 p-6 space-y-5">
        
        <!-- 1. COMPACT DECISION BOX WITH LOGO BACKGROUND -->
        <div id="decisionBox" class="p-4 rounded-xl border transition-all duration-300 border-gray-750 relative overflow-hidden bg-[url('icon.svg')] bg-cover bg-center bg-no-repeat">
            <div id="decisionOverlay" class="absolute inset-0 bg-gray-950/90 transition-colors duration-300"></div>

            <div class="relative z-10 grid grid-cols-2 gap-y-3 gap-x-4 text-left text-xs text-gray-300">
                <div>Est. Gas Cost: <span id="estGas" class="font-bold text-gray-400 block text-sm mt-1">$0.00</span></div>
                <div>Current Trip Profit: <span id="netProfit" class="font-black text-white block text-lg mt-0">$0.00</span></div>
                
                <div class="col-span-2 pt-2 border-t border-gray-800/50 grid grid-cols-2 gap-2">
                    <div>Pay per KM: <span id="payPerKm" class="font-bold text-white block mt-1">$0.00/KM</span></div>
                    <div>Est. Hourly: <span id="payPerHour" class="font-bold text-white block mt-1">$0.00/HR</span></div>
                </div>
            </div>
            
            <button id="saveTripBtn" class="hidden relative z-10 w-full mt-3 bg-blue-600/90 backdrop-blur hover:bg-blue-500 text-white font-black py-2.5 rounded-lg border border-blue-400 shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all uppercase tracking-widest text-xs">
                💾 Save Trip
            </button>
        </div>

        <!-- 2. SHIFT PROFILE HEADER -->
        <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 flex justify-between items-center">
            <div>
                <span class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">Active Barrie Profile</span>
                <span id="shiftProfileName" class="text-sm font-black text-emerald-400">Detecting Time...</span>
            </div>
            <button id="resetOptimumBtn" class="bg-gray-900 border border-gray-600 text-gray-300 text-xs font-bold py-1 px-3 rounded hover:bg-emerald-900 hover:text-emerald-300 hover:border-emerald-500 transition-colors">
                ↺ Load Optimum
            </button>
        </div>

        <!-- 3. COLLAPSIBLE INPUT SETTINGS -->
        <div>
            <button id="toggleInputBtn" class="w-full bg-gray-800 hover:bg-gray-700 active:bg-gray-600 text-gray-300 font-bold py-3 rounded-xl border border-gray-700 flex justify-between items-center px-5 transition-colors">
                <span class="tracking-widest uppercase text-sm">⚙️ TRIPLE-FILTER TARGETS</span>
                <span id="toggleIcon" class="text-xl">▼</span>
            </button>

            <div id="inputSettingsPanel" class="hidden bg-gray-900 p-5 rounded-xl border border-gray-700 space-y-4 mt-2 shadow-inner">
                
                <div class="space-y-3 bg-gray-800 p-3 rounded-lg border border-gray-700">
                    <h3 class="text-xs font-black text-emerald-400 uppercase tracking-widest mb-2 border-b border-gray-700 pb-1">My Minimum Goals</h3>
                    
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-400 uppercase">1. Min Profit ($)</label>
                        <input type="number" id="minTripProfit" step="1.00" class="w-20 bg-gray-900 border border-gray-600 rounded py-1 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>

                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-400 uppercase">2. Target ($/KM)</label>
                        <input type="number" id="targetPay" step="0.10" class="w-20 bg-gray-900 border border-gray-600 rounded py-1 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>

                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-400 uppercase">3. Wage ($/HR)</label>
                        <input type="number" id="targetHourly" step="1.00" class="w-20 bg-gray-900 border border-gray-600 rounded py-1 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>

                    <button id="saveManualTargetsBtn" class="w-full mt-2 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold py-2 rounded transition-colors uppercase tracking-widest">
                        💾 Save Custom Targets
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Daily Target ($)</label>
                        <input type="number" id="dailyTarget" step="5.00" value="100.00" class="w-full bg-gray-800 border border-gray-700 rounded py-2 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Gas Cost ($/KM)</label>
                        <input type="number" id="gasCost" step="0.01" value="0.14" class="w-full bg-gray-800 border border-gray-700 rounded py-2 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                </div>
            </div>
        </div>

        <hr class="border-gray-700">

        <!-- 4. DROP-DOWN INPUTS -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Uber Offer ($)</label>
                <select id="uberOffer" class="w-full bg-gray-950 border-2 border-gray-700 rounded-xl py-4 px-4 text-2xl font-black text-white focus:ring-4 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none appearance-none cursor-pointer">
                    <option value="">Tap to select offer</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Distance (KM)</label>
                    <select id="tripDistance" class="w-full bg-gray-950 border-2 border-gray-700 rounded-xl py-3 px-3 text-xl font-black text-white focus:ring-4 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none appearance-none cursor-pointer">
                        <option value="">KM</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Time (Mins)</label>
                    <select id="tripDuration" class="w-full bg-gray-950 border-2 border-gray-700 rounded-xl py-3 px-3 text-xl font-black text-white focus:ring-4 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none appearance-none cursor-pointer">
                        <option value="">Mins</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center justify-between bg-gray-800 p-4 rounded-xl border border-gray-700 mt-2">
                <span class="text-sm font-bold text-gray-300">Requires empty return trip?</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="deadMiles" class="sr-only peer">
                    <div class="w-14 h-8 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500"></div>
                </label>
            </div>
        </div>

        <!-- 5. SHIFT TRACKER CARD WITH LEDGER & MILEAGE -->
        <div class="bg-gray-900 rounded-xl border-2 border-gray-700 p-5 mt-6 shadow-lg">
            <div class="flex justify-between items-end mb-3">
                <div class="flex-1">
                    <span class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">Total</span>
                    <span id="shiftTotalDisplay" class="text-2xl font-black text-emerald-400">$0.00</span>
                </div>
                <div class="flex-1 text-center border-x border-gray-700 px-2 mx-2">
                    <span class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">Driven</span>
                    <span id="shiftDistanceDisplay" class="text-xl font-black text-blue-400">0 KM</span>
                </div>
                <div class="flex-1 text-right">
                    <span class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest">Trips</span>
                    <span id="shiftCountDisplay" class="text-2xl font-black text-white">0</span>
                </div>
            </div>
            
            <div class="w-full bg-gray-800 rounded-full h-3 mb-2 border border-gray-700 mt-2">
                <div id="shiftProgressBar" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs font-bold text-gray-400">
                <span>Goal Progress</span>
                <span id="shiftProgressText">0%</span>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-4">
                <button id="toggleLedgerBtn" class="bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white font-bold py-2 rounded border border-gray-700 transition-colors text-xs uppercase tracking-widest">
                    📋 Trip Ledger
                </button>
                <button id="resetShiftBtn" class="bg-gray-800 hover:bg-rose-900/50 text-gray-400 hover:text-rose-400 font-bold py-2 rounded border border-gray-700 transition-colors text-xs uppercase tracking-widest">
                    Reset Shift
                </button>
            </div>

            <!-- Expandable Trip Ledger List -->
            <div id="tripLedgerPanel" class="hidden mt-4 pt-4 border-t border-gray-700 space-y-2 max-h-48 overflow-y-auto pr-1">
                <div id="emptyLedgerMsg" class="text-center text-gray-500 text-xs italic">No trips saved yet.</div>
                <ul id="tripList" class="space-y-2"></ul>
            </div>
        </div>

    </div>

    <script>
        // DOM Elements
        const minTripProfitInput = document.getElementById('minTripProfit');
        const targetPayInput = document.getElementById('targetPay');
        const targetHourlyInput = document.getElementById('targetHourly');
        const dailyTargetInput = document.getElementById('dailyTarget');
        const gasCostInput = document.getElementById('gasCost');
        
        const uberOfferSelect = document.getElementById('uberOffer');
        const tripDistanceSelect = document.getElementById('tripDistance');
        const tripDurationSelect = document.getElementById('tripDuration');
        const deadMilesInput = document.getElementById('deadMiles');
        
        const toggleInputBtn = document.getElementById('toggleInputBtn');
        const inputSettingsPanel = document.getElementById('inputSettingsPanel');
        const toggleIcon = document.getElementById('toggleIcon');
        const resetOptimumBtn = document.getElementById('resetOptimumBtn');
        const saveManualTargetsBtn = document.getElementById('saveManualTargetsBtn');
        const shiftProfileName = document.getElementById('shiftProfileName');

        const decisionBox = document.getElementById('decisionBox');
        const decisionOverlay = document.getElementById('decisionOverlay');
        const estGasSpan = document.getElementById('estGas');
        const netProfitSpan = document.getElementById('netProfit');
        const payPerKmSpan = document.getElementById('payPerKm');
        const payPerHourSpan = document.getElementById('payPerHour');
        
        const saveTripBtn = document.getElementById('saveTripBtn');
        const toggleLedgerBtn = document.getElementById('toggleLedgerBtn');
        const resetShiftBtn = document.getElementById('resetShiftBtn');
        const shiftTotalDisplay = document.getElementById('shiftTotalDisplay');
        const shiftDistanceDisplay = document.getElementById('shiftDistanceDisplay');
        const shiftCountDisplay = document.getElementById('shiftCountDisplay');
        const shiftProgressBar = document.getElementById('shiftProgressBar');
        const shiftProgressText = document.getElementById('shiftProgressText');
        const tripLedgerPanel = document.getElementById('tripLedgerPanel');
        const tripList = document.getElementById('tripList');
        const emptyLedgerMsg = document.getElementById('emptyLedgerMsg');

        // State Variables
        let currentTripProfit = 0; 
        let manualOverride = localStorage.getItem('manualOverride') === 'true';
        let tripLedger = JSON.parse(localStorage.getItem('tripLedger')) || [];

        // --- TIME OF DAY LOGIC ---
        function determineTimeProfile() {
            const now = new Date();
            const day = now.getDay(); 
            const hour = now.getHours(); 
            
            let profile = { name: "Off-Peak", min: 4, km: 1.00, hr: 16 };

            if ((day === 5 || day === 6) && (hour >= 17 && hour < 21)) {
                profile = { name: "Peak Dinner Rush", min: 6, km: 1.50, hr: 24 };
            } else if ((day === 5 || day === 6) && (hour >= 22 || hour < 2)) {
                profile = { name: "Late Night Rush", min: 5, km: 1.20, hr: 22 };
            } else if ((hour >= 11 && hour < 14) || (hour >= 17 && hour < 21)) {
                profile = { name: "Standard Rush", min: 5, km: 1.20, hr: 20 };
            }
            return profile;
        }

        function loadOptimumSettings() {
            const profile = determineTimeProfile();
            shiftProfileName.innerText = profile.name;
            shiftProfileName.className = "text-sm font-black text-emerald-400";
            
            minTripProfitInput.value = profile.min.toFixed(2);
            targetPayInput.value = profile.km.toFixed(2);
            targetHourlyInput.value = profile.hr.toFixed(2);
            
            manualOverride = false;
            localStorage.setItem('manualOverride', 'false');
            calculate();
        }

        // --- INITIALIZATION ---
        for (let i = 1; i <= 100; i++) {
            let opt = document.createElement('option'); opt.value = i; opt.innerHTML = `$${i}.00`; uberOfferSelect.appendChild(opt);
            let opt2 = document.createElement('option'); opt2.value = i; opt2.innerHTML = `${i} KM`; tripDistanceSelect.appendChild(opt2);
        }
        for (let i = 5; i <= 120; i += 5) {
            let opt = document.createElement('option'); opt.value = i; opt.innerHTML = `${i} Mins`; tripDurationSelect.appendChild(opt);
        }

        if (localStorage.getItem('gasCost')) gasCostInput.value = localStorage.getItem('gasCost');
        if (localStorage.getItem('dailyTarget')) dailyTargetInput.value = localStorage.getItem('dailyTarget');

        if (manualOverride) {
            shiftProfileName.innerText = "Custom Settings";
            shiftProfileName.className = "text-sm font-black text-amber-400";
            minTripProfitInput.value = localStorage.getItem('customMin') || 5.00;
            targetPayInput.value = localStorage.getItem('customKm') || 1.20;
            targetHourlyInput.value = localStorage.getItem('customHr') || 20.00;
        } else {
            loadOptimumSettings();
        }
        updateShiftTrackerUI();

        // --- EVENT HANDLERS ---
        toggleInputBtn.addEventListener('click', () => {
            inputSettingsPanel.classList.toggle('hidden');
            toggleIcon.innerText = inputSettingsPanel.classList.contains('hidden') ? '▼' : '▲';
        });

        toggleLedgerBtn.addEventListener('click', () => {
            tripLedgerPanel.classList.toggle('hidden');
        });

        resetOptimumBtn.addEventListener('click', () => {
            loadOptimumSettings();
            alert("Settings reset to Optimum for the current time.");
        });

        saveManualTargetsBtn.addEventListener('click', () => {
            manualOverride = true;
            localStorage.setItem('manualOverride', 'true');
            localStorage.setItem('customMin', minTripProfitInput.value);
            localStorage.setItem('customKm', targetPayInput.value);
            localStorage.setItem('customHr', targetHourlyInput.value);
            
            shiftProfileName.innerText = "Custom Settings";
            shiftProfileName.className = "text-sm font-black text-amber-400";
            
            inputSettingsPanel.classList.add('hidden');
            toggleIcon.innerText = '▼';
            calculate();
        });

        // --- CORE CALCULATOR LOGIC ---
        function calculate() {
            const gasCost = parseFloat(gasCostInput.value) || 0;
            const minTripProfit = parseFloat(minTripProfitInput.value) || 0;
            const targetPayPerKm = parseFloat(targetPayInput.value) || 0;
            const targetHourly = parseFloat(targetHourlyInput.value) || 0;
            
            const uberOffer = parseFloat(uberOfferSelect.value) || 0;
            const tripDistance = parseFloat(tripDistanceSelect.value) || 0;
            const tripDuration = parseFloat(tripDurationSelect.value) || 0;
            const deadMilesMultiplier = deadMilesInput.checked ? 2 : 1;

            localStorage.setItem('gasCost', gasCostInput.value);
            localStorage.setItem('dailyTarget', dailyTargetInput.value);
            updateShiftTrackerUI(); 

            if (uberOffer <= 0 || tripDistance <= 0 || tripDuration <= 0) {
                resetDecisionUI();
                return;
            }

            const calculationDistance = tripDistance * deadMilesMultiplier;
            const estGas = calculationDistance * gasCost;
            currentTripProfit = uberOffer - estGas;
            
            const payPerKm = tripDistance > 0 ? (currentTripProfit / tripDistance) : 0;
            const totalHours = (tripDuration * deadMilesMultiplier) / 60;
            const payPerHour = totalHours > 0 ? (currentTripProfit / totalHours) : 0;
            
            const passedMinProfit = currentTripProfit >= minTripProfit;
            const passedKm = payPerKm >= targetPayPerKm;
            const passedHourly = payPerHour >= targetHourly;
            const passedAll = passedMinProfit && passedKm && passedHourly;

            const getIcon = (passed) => passed ? '<span class="ml-1 text-xs">✅</span>' : '<span class="ml-1 text-xs grayscale opacity-60">❌</span>';

            estGasSpan.innerText = `-$${estGas.toFixed(2)}`;
            netProfitSpan.innerHTML = `$${currentTripProfit.toFixed(2)}` + getIcon(passedMinProfit);
            payPerKmSpan.innerHTML = `$${payPerKm.toFixed(2)}/KM` + getIcon(passedKm);
            payPerHourSpan.innerHTML = `$${payPerHour.toFixed(2)}/HR` + getIcon(passedHourly);

            saveTripBtn.classList.remove('hidden');

            if (passedAll) {
                decisionBox.className = "p-4 rounded-xl border-2 transition-all duration-200 border-emerald-400 shadow-lg shadow-emerald-900/30 relative overflow-hidden bg-[url('icon.svg')] bg-cover bg-center bg-no-repeat";
                decisionOverlay.className = "absolute inset-0 bg-emerald-900/85 transition-colors duration-300 backdrop-blur-[2px]";
                netProfitSpan.className = "font-black text-white block text-lg mt-0";
            } else {
                decisionBox.className = "p-4 rounded-xl border-2 transition-all duration-200 border-rose-400 shadow-lg shadow-rose-900/30 relative overflow-hidden bg-[url('icon.svg')] bg-cover bg-center bg-no-repeat";
                decisionOverlay.className = "absolute inset-0 bg-rose-900/85 transition-colors duration-300 backdrop-blur-[2px]";
                netProfitSpan.className = "font-black text-rose-200 block text-lg mt-0";
            }
        }

        function resetDecisionUI() {
            decisionBox.className = "p-4 rounded-xl border transition-all duration-200 border-gray-750 relative overflow-hidden bg-[url('icon.svg')] bg-cover bg-center bg-no-repeat";
            decisionOverlay.className = "absolute inset-0 bg-gray-950/90 transition-colors duration-300";
            estGasSpan.innerText = "$0.00";
            netProfitSpan.innerText = "$0.00";
            payPerKmSpan.innerText = "$0.00/KM";
            payPerHourSpan.innerText = "$0.00/HR";
            saveTripBtn.classList.add('hidden');
            currentTripProfit = 0;
        }

        function renderLedger() {
            tripList.innerHTML = '';
            
            if (tripLedger.length === 0) {
                emptyLedgerMsg.classList.remove('hidden');
            } else {
                emptyLedgerMsg.classList.add('hidden');
                
                [...tripLedger].reverse().forEach((trip, index) => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-gray-800 p-3 rounded-lg border border-gray-700";
                    li.innerHTML = `
                        <div>
                            <span class="text-[10px] text-gray-500 font-bold uppercase block leading-none mb-1">Trip #${tripLedger.length - index} <span class="text-blue-400 ml-1 tracking-normal">• ${trip.distance || 0} KM</span></span>
                            <span class="text-lg font-black text-emerald-400 leading-none">+$${trip.profit.toFixed(2)}</span>
                        </div>
                        <button onclick="deleteTrip(${trip.id})" class="text-rose-400 hover:text-white font-bold text-[10px] uppercase tracking-widest bg-gray-900 hover:bg-rose-600 px-3 py-2 rounded-md border border-gray-600 hover:border-rose-500 transition-colors">Delete</button>
                    `;
                    tripList.appendChild(li);
                });
            }
        }

        function updateShiftTrackerUI() {
            const shiftTotal = tripLedger.reduce((sum, trip) => sum + trip.profit, 0);
            const shiftDistance = tripLedger.reduce((sum, trip) => sum + (trip.distance || 0), 0);
            const shiftCount = tripLedger.length;
            const dailyTarget = parseFloat(dailyTargetInput.value) || 1; 
            
            shiftTotalDisplay.innerText = `$${shiftTotal.toFixed(2)}`;
            shiftDistanceDisplay.innerText = `${shiftDistance} KM`;
            shiftCountDisplay.innerText = shiftCount;
            
            let progressPercentage = (shiftTotal / dailyTarget) * 100;
            if (progressPercentage > 100) progressPercentage = 100;
            if (progressPercentage < 0) progressPercentage = 0;
            
            shiftProgressBar.style.width = `${progressPercentage}%`;
            shiftProgressText.innerText = `${((shiftTotal / dailyTarget) * 100).toFixed(1)}%`;
            
            renderLedger();
        }

        window.deleteTrip = function(id) {
            if(confirm("Are you sure you want to delete this trip?")) {
                tripLedger = tripLedger.filter(trip => trip.id !== id);
                localStorage.setItem('tripLedger', JSON.stringify(tripLedger));
                updateShiftTrackerUI();
            }
        };

        // --- TRACKER ACTIONS ---
        saveTripBtn.addEventListener('click', () => {
            if (currentTripProfit !== 0) {
                const tripDistance = parseFloat(tripDistanceSelect.value) || 0;
                const deadMilesMultiplier = deadMilesInput.checked ? 2 : 1;
                const actualDistance = tripDistance * deadMilesMultiplier;

                const newTrip = {
                    id: Date.now(),
                    profit: parseFloat(currentTripProfit.toFixed(2)),
                    distance: actualDistance
                };
                
                tripLedger.push(newTrip);
                localStorage.setItem('tripLedger', JSON.stringify(tripLedger));
                
                updateShiftTrackerUI();

                uberOfferSelect.value = "";
                tripDistanceSelect.value = "";
                tripDurationSelect.value = "";
                deadMilesInput.checked = false;
                
                resetDecisionUI();
            }
        });

        resetShiftBtn.addEventListener('click', () => {
            if(confirm("Reset shift totals? Ensure you've logged this in your spreadsheet!")) {
                tripLedger = [];
                localStorage.removeItem('tripLedger');
                updateShiftTrackerUI();
                tripLedgerPanel.classList.add('hidden');
            }
        });

        // Trigger calculation on any input change
        [gasCostInput, dailyTargetInput, uberOfferSelect, tripDistanceSelect, tripDurationSelect, deadMilesInput].forEach(element => {
            element.addEventListener('input', calculate);
        });
    </script>
</body>
</html>
