<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Profit Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4 pb-10">

    <div class="w-full max-w-md bg-gray-850 rounded-2xl shadow-xl border border-gray-700 p-6 space-y-5">
        
        <!-- 1. HIGH-VISIBILITY DECISION AT THE TOP -->
        <div id="decisionBox" class="p-6 rounded-xl border text-center transition-all duration-300 bg-gray-950 border-gray-750">
            <span id="decisionLabel" class="block text-xs font-bold text-gray-400 uppercase tracking-widest">DECISION</span>
            <div id="decisionText" class="text-4xl font-black my-2 text-gray-400">ENTER DATA</div>
            
            <div class="grid grid-cols-2 gap-y-3 gap-x-4 mt-4 text-left text-xs text-gray-300 border-t border-gray-800/50 pt-4">
                <div>Est. Gas Cost: <span id="estGas" class="font-bold text-gray-400 block text-sm mt-1">$0.00</span></div>
                <div>Current Trip Profit: <span id="netProfit" class="font-black text-white block text-lg mt-0">$0.00</span></div>
                
                <div class="col-span-2 pt-2 border-t border-gray-800/50 grid grid-cols-2 gap-2">
                    <div>Pay per KM: <span id="payPerKm" class="font-bold text-white block mt-1">$0.00/KM</span></div>
                    <div>Est. Hourly: <span id="payPerHour" class="font-bold text-white block mt-1">$0.00/HR</span></div>
                </div>
            </div>
            
            <!-- Save Action -->
            <button id="saveTripBtn" class="hidden w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-lg border-2 border-blue-400 shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all uppercase tracking-widest text-sm">
                💾 Save Trip to Shift
            </button>
        </div>

        <!-- 2. COLLAPSIBLE INPUT SETTINGS BUTTON -->
        <div>
            <button id="toggleInputBtn" class="w-full bg-gray-800 hover:bg-gray-700 active:bg-gray-600 text-gray-300 font-bold py-3 rounded-xl border border-gray-700 flex justify-between items-center px-5 transition-colors">
                <span class="tracking-widest uppercase text-sm">⚙️ TRIPLE-FILTER TARGETS</span>
                <span id="toggleIcon" class="text-xl">▼</span>
            </button>

            <!-- Hidden Input Panel -->
            <div id="inputSettingsPanel" class="hidden bg-gray-900 p-5 rounded-xl border border-gray-700 space-y-4 mt-2 shadow-inner">
                
                <!-- The 3 Core Filters -->
                <div class="space-y-3 bg-gray-800 p-3 rounded-lg border border-gray-700">
                    <h3 class="text-xs font-black text-emerald-400 uppercase tracking-widest mb-2 border-b border-gray-700 pb-1">My Minimum Goals</h3>
                    
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-400 uppercase">1. Min Profit / Trip ($)</label>
                        <input type="number" id="minTripProfit" step="1.00" value="5.00" class="w-20 bg-gray-900 border border-gray-600 rounded py-1 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>

                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-400 uppercase">2. Target Pay ($/KM)</label>
                        <input type="number" id="targetPay" step="0.10" value="1.50" class="w-20 bg-gray-900 border border-gray-600 rounded py-1 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>

                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-400 uppercase">3. Target Wage ($/HR)</label>
                        <input type="number" id="targetHourly" step="1.00" value="22.00" class="w-20 bg-gray-900 border border-gray-600 rounded py-1 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                </div>

                <!-- Secondary Goals -->
                <div class="grid grid-cols-2 gap-3 mt-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Daily Target ($)</label>
                        <input type="number" id="dailyTarget" step="5.00" value="100.00" class="w-full bg-gray-800 border border-gray-700 rounded py-2 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Vehicle Cost ($/KM)</label>
                        <input type="number" id="gasCost" step="0.01" value="0.14" class="w-full bg-gray-800 border border-gray-700 rounded py-2 px-2 text-sm font-bold text-white text-center focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                </div>
            </div>
        </div>

        <hr class="border-gray-700">

        <!-- 3. LARGE, EASY-TO-CLICK DROP-DOWN INPUTS -->
        <div class="space-y-4">
            <!-- Uber Offer Dropdown -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Uber Offer ($)</label>
                <select id="uberOffer" class="w-full bg-gray-950 border-2 border-gray-700 rounded-xl py-4 px-4 text-2xl font-black text-white focus:ring-4 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none appearance-none cursor-pointer">
                    <option value="">Tap to select offer</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <!-- Trip Distance Dropdown -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Distance (KM)</label>
                    <select id="tripDistance" class="w-full bg-gray-950 border-2 border-gray-700 rounded-xl py-3 px-3 text-xl font-black text-white focus:ring-4 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none appearance-none cursor-pointer">
                        <option value="">KM</option>
                    </select>
                </div>

                <!-- Trip Duration Dropdown -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Time (Mins)</label>
                    <select id="tripDuration" class="w-full bg-gray-950 border-2 border-gray-700 rounded-xl py-3 px-3 text-xl font-black text-white focus:ring-4 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none appearance-none cursor-pointer">
                        <option value="">Mins</option>
                    </select>
                </div>
            </div>

            <!-- Dead Miles Toggle -->
            <div class="flex items-center justify-between bg-gray-800 p-4 rounded-xl border border-gray-700 mt-2">
                <span class="text-sm font-bold text-gray-300">Requires empty return trip?</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="deadMiles" class="sr-only peer">
                    <div class="w-14 h-8 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500"></div>
                </label>
            </div>
        </div>

        <!-- 4. SHIFT TRACKER CARD -->
        <div class="bg-gray-900 rounded-xl border-2 border-gray-700 p-5 mt-6 shadow-lg">
            <div class="flex justify-between items-end mb-3">
                <div>
                    <span class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Shift Running Total</span>
                    <span id="shiftTotalDisplay" class="text-3xl font-black text-emerald-400">$0.00</span>
                </div>
                <div class="text-right">
                    <span class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Trips</span>
                    <span id="shiftCountDisplay" class="text-2xl font-black text-white">0</span>
                </div>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full bg-gray-800 rounded-full h-3 mb-2 border border-gray-700">
                <div id="shiftProgressBar" class="bg-emerald-500 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs font-bold text-gray-400">
                <span>Goal Progress</span>
                <span id="shiftProgressText">0%</span>
            </div>

            <button id="resetShiftBtn" class="w-full mt-4 bg-gray-800 hover:bg-rose-900/50 text-gray-400 hover:text-rose-400 font-bold py-2 rounded border border-gray-700 transition-colors text-xs uppercase tracking-widest">
                Reset Shift
            </button>
        </div>

    </div>

    <script>
        // DOM Elements
        const gasCostInput = document.getElementById('gasCost');
        const minTripProfitInput = document.getElementById('minTripProfit');
        const targetPayInput = document.getElementById('targetPay');
        const targetHourlyInput = document.getElementById('targetHourly');
        const dailyTargetInput = document.getElementById('dailyTarget');
        
        const uberOfferSelect = document.getElementById('uberOffer');
        const tripDistanceSelect = document.getElementById('tripDistance');
        const tripDurationSelect = document.getElementById('tripDuration');
        const deadMilesInput = document.getElementById('deadMiles');
        
        const toggleInputBtn = document.getElementById('toggleInputBtn');
        const inputSettingsPanel = document.getElementById('inputSettingsPanel');
        const toggleIcon = document.getElementById('toggleIcon');

        const decisionBox = document.getElementById('decisionBox');
        const decisionText = document.getElementById('decisionText');
        const decisionLabel = document.getElementById('decisionLabel');
        const estGasSpan = document.getElementById('estGas');
        const netProfitSpan = document.getElementById('netProfit');
        const payPerKmSpan = document.getElementById('payPerKm');
        const payPerHourSpan = document.getElementById('payPerHour');
        
        const saveTripBtn = document.getElementById('saveTripBtn');
        const resetShiftBtn = document.getElementById('resetShiftBtn');
        const shiftTotalDisplay = document.getElementById('shiftTotalDisplay');
        const shiftCountDisplay = document.getElementById('shiftCountDisplay');
        const shiftProgressBar = document.getElementById('shiftProgressBar');
        const shiftProgressText = document.getElementById('shiftProgressText');

        // State Variables for Shift
        let shiftTotal = parseFloat(localStorage.getItem('shiftTotal')) || 0;
        let shiftCount = parseInt(localStorage.getItem('shiftCount')) || 0;
        let currentTripProfit = 0; // Holds valid profit before saving

        // Toggle Input Panel Logic
        toggleInputBtn.addEventListener('click', () => {
            inputSettingsPanel.classList.toggle('hidden');
            toggleIcon.innerText = inputSettingsPanel.classList.contains('hidden') ? '▼' : '▲';
        });

        // Dynamically populate Dropdowns
        for (let i = 1; i <= 100; i++) {
            let opt = document.createElement('option'); opt.value = i; opt.innerHTML = `$${i}.00`; uberOfferSelect.appendChild(opt);
            let opt2 = document.createElement('option'); opt2.value = i; opt2.innerHTML = `${i} KM`; tripDistanceSelect.appendChild(opt2);
        }
        for (let i = 5; i <= 120; i += 5) {
            let opt = document.createElement('option'); opt.value = i; opt.innerHTML = `${i} Mins`; tripDurationSelect.appendChild(opt);
        }

        // Load saved settings
        ['gasCost', 'minTripProfit', 'targetPay', 'targetHourly', 'dailyTarget'].forEach(id => {
            if (localStorage.getItem(id)) document.getElementById(id).value = localStorage.getItem(id);
        });

        // Update Tracker UI on load
        updateShiftTrackerUI();

        function calculate() {
            const gasCost = parseFloat(gasCostInput.value) || 0;
            const minTripProfit = parseFloat(minTripProfitInput.value) || 0;
            const targetPayPerKm = parseFloat(targetPayInput.value) || 0;
            const targetHourly = parseFloat(targetHourlyInput.value) || 0;
            const dailyTarget = parseFloat(dailyTargetInput.value) || 0;
            
            const uberOffer = parseFloat(uberOfferSelect.value) || 0;
            const tripDistance = parseFloat(tripDistanceSelect.value) || 0;
            const tripDuration = parseFloat(tripDurationSelect.value) || 0;
            const deadMilesMultiplier = deadMilesInput.checked ? 2 : 1;

            // Save settings locally
            ['gasCost', 'minTripProfit', 'targetPay', 'targetHourly', 'dailyTarget'].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value);
            });
            updateShiftTrackerUI(); // Recalculate progress bar if daily target changed

            if (uberOffer <= 0 || tripDistance <= 0 || tripDuration <= 0) {
                resetDecisionUI();
                return;
            }

            // Math Calculations
            const calculationDistance = tripDistance * deadMilesMultiplier;
            const estGas = calculationDistance * gasCost;
            currentTripProfit = uberOffer - estGas;
            
            const payPerKm = tripDistance > 0 ? (currentTripProfit / tripDistance) : 0;
            const totalHours = (tripDuration * deadMilesMultiplier) / 60;
            const payPerHour = totalHours > 0 ? (currentTripProfit / totalHours) : 0;
            
            // Triple-Filter Pass/Fail Checks
            const passedMinProfit = currentTripProfit >= minTripProfit;
            const passedKm = payPerKm >= targetPayPerKm;
            const passedHourly = payPerHour >= targetHourly;
            const passedAll = passedMinProfit && passedKm && passedHourly;

            const getIcon = (passed) => passed ? '<span class="ml-1 text-xs">✅</span>' : '<span class="ml-1 text-xs grayscale opacity-60">❌</span>';

            // Update UI Strings
            estGasSpan.innerText = `-$${estGas.toFixed(2)}`;
            netProfitSpan.innerHTML = `$${currentTripProfit.toFixed(2)}` + getIcon(passedMinProfit);
            payPerKmSpan.innerHTML = `$${payPerKm.toFixed(2)}/KM` + getIcon(passedKm);
            payPerHourSpan.innerHTML = `$${payPerHour.toFixed(2)}/HR` + getIcon(passedHourly);

            // Show Save Button since data is valid
            saveTripBtn.classList.remove('hidden');

            // Make Final Decision
            if (passedAll) {
                decisionText.innerText = "ACCEPT";
                decisionText.className = "text-4xl font-black my-2 text-white";
                decisionLabel.className = "block text-xs font-bold text-emerald-200 uppercase tracking-widest";
                decisionBox.className = "p-6 rounded-xl border-2 text-center transition-all duration-200 bg-emerald-600 border-emerald-400 shadow-lg shadow-emerald-900/30 pb-4";
                netProfitSpan.className = "font-black text-white block text-lg mt-0";
            } else {
                decisionText.innerText = "DECLINE";
                decisionText.className = "text-4xl font-black my-2 text-white";
                decisionLabel.className = "block text-xs font-bold text-rose-200 uppercase tracking-widest";
                decisionBox.className = "p-6 rounded-xl border-2 text-center transition-all duration-200 bg-rose-600 border-rose-400 shadow-lg shadow-rose-900/30 pb-4";
                netProfitSpan.className = "font-black text-rose-200 block text-lg mt-0";
            }
        }

        function resetDecisionUI() {
            decisionText.innerText = "ENTER DATA";
            decisionText.className = "text-4xl font-black my-2 text-gray-400";
            decisionLabel.className = "block text-xs font-bold text-gray-400 uppercase tracking-widest";
            decisionBox.className = "p-6 rounded-xl border text-center transition-all duration-200 bg-gray-950 border-gray-750";
            estGasSpan.innerText = "$0.00";
            netProfitSpan.innerText = "$0.00";
            payPerKmSpan.innerText = "$0.00/KM";
            payPerHourSpan.innerText = "$0.00/HR";
            saveTripBtn.classList.add('hidden');
            currentTripProfit = 0;
        }

        function updateShiftTrackerUI() {
            const dailyTarget = parseFloat(dailyTargetInput.value) || 1; // avoid / 0
            shiftTotalDisplay.innerText = `$${shiftTotal.toFixed(2)}`;
            shiftCountDisplay.innerText = shiftCount;
            
            let progressPercentage = (shiftTotal / dailyTarget) * 100;
            if (progressPercentage > 100) progressPercentage = 100;
            if (progressPercentage < 0) progressPercentage = 0;
            
            shiftProgressBar.style.width = `${progressPercentage}%`;
            shiftProgressText.innerText = `${((shiftTotal / dailyTarget) * 100).toFixed(1)}%`;
        }

        // Action: Save Trip
        saveTripBtn.addEventListener('click', () => {
            if (currentTripProfit !== 0) {
                shiftTotal += currentTripProfit;
                shiftCount += 1;
                localStorage.setItem('shiftTotal', shiftTotal);
                localStorage.setItem('shiftCount', shiftCount);
                
                updateShiftTrackerUI();

                // Clear dropdowns for next order
                uberOfferSelect.value = "";
                tripDistanceSelect.value = "";
                tripDurationSelect.value = "";
                deadMilesInput.checked = false;
                
                resetDecisionUI();
            }
        });

        // Action: Reset Shift
        resetShiftBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to reset your shift totals? Make sure you logged them in your spreadsheet!")) {
                shiftTotal = 0;
                shiftCount = 0;
                localStorage.removeItem('shiftTotal');
                localStorage.removeItem('shiftCount');
                updateShiftTrackerUI();
            }
        });

        // Event Listeners
        [gasCostInput, minTripProfitInput, targetPayInput, targetHourlyInput, dailyTargetInput, uberOfferSelect, tripDistanceSelect, tripDurationSelect, deadMilesInput].forEach(element => {
            element.addEventListener('input', calculate);
        });
    </script>
</body>
</html>
