<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Background Brushed Metal -->
        <radialGradient id="bgMetal" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#333538"/>
            <stop offset="60%" stop-color="#141518"/>
            <stop offset="100%" stop-color="#050506"/>
        </radialGradient>

        <!-- High Contrast Chrome for Text and Icon -->
        <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e6e6e6"/>
            <stop offset="42%" stop-color="#ffffff"/>
            <stop offset="45%" stop-color="#3a3c40"/>
            <stop offset="50%" stop-color="#111111"/>
            <stop offset="65%" stop-color="#6a6d75"/>
            <stop offset="100%" stop-color="#d0d0d0"/>
        </linearGradient>

        <!-- Neon Green Glowing Edge -->
        <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d4ff00"/>
            <stop offset="50%" stop-color="#00ff33"/>
            <stop offset="100%" stop-color="#00aa11"/>
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur1"/>
            <feGaussianBlur stdDeviation="25" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- 3D Chrome Bevel and Drop Shadow -->
        <filter id="chrome3D" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="15" stdDeviation="10" flood-color="#000" flood-opacity="0.9"/>
            <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.7"/>
            <!-- Inner Bevel Highlight -->
            <feComponentTransfer in="SourceAlpha" result="alpha"/>
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feOffset dy="-2" dx="-2"/>
            <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
            <feFlood flood-color="#ffffff" flood-opacity="0.8"/>
            <feComposite in2="shadowDiff" operator="in"/>
            <feComposite in2="SourceGraphic" operator="over"/>
        </filter>

        <!-- Inner Shadow for the background circle -->
        <filter id="innerShadow">
            <feOffset dx="0" dy="8"/>
            <feGaussianBlur stdDeviation="6" result="offset-blur"/>
            <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
            <feFlood flood-color="black" flood-opacity="0.95" result="color"/>
            <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
            <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
        </filter>
    </defs>

    <!-- Dark Metal Canvas -->
    <rect width="512" height="512" fill="url(#bgMetal)"/>

    <!-- Glowing Green Halo -->
    <circle cx="256" cy="256" r="218" fill="none" stroke="url(#neonGreen)" stroke-width="14" filter="url(#greenGlow)"/>

    <!-- Outer Chrome Ring -->
    <circle cx="256" cy="256" r="225" fill="none" stroke="url(#chrome)" stroke-width="12" filter="url(#chrome3D)"/>
    <circle cx="256" cy="256" r="211" fill="none" stroke="url(#chrome)" stroke-width="4" filter="url(#chrome3D)"/>

    <!-- Inner Recessed Metal Area -->
    <circle cx="256" cy="256" r="208" fill="url(#bgMetal)" filter="url(#innerShadow)"/>

    <!-- Lens Flare / Starburst on top left ring -->
    <g filter="url(#greenGlow)">
        <path d="M100 50 L104 90 L144 94 L104 98 L100 138 L96 98 L56 94 L96 90 Z" fill="#d4ff00"/>
        <circle cx="100" cy="94" r="6" fill="#ffffff"/>
    </g>

    <!-- Lower text integrated into the bottom ring -->
    <text x="256" y="445" font-family="'Trebuchet MS', 'Arial Black', sans-serif" font-weight="900" font-size="40" fill="url(#chrome)" text-anchor="middle" letter-spacing="8" filter="url(#chrome3D)">CALC</text>

    <!-- Top Text integrated into the upper ring -->
    <text x="256" y="140" font-family="'Trebuchet MS', 'Arial Black', sans-serif" font-weight="900" font-size="95" fill="url(#chrome)" text-anchor="middle" letter-spacing="1" filter="url(#chrome3D)">profit</text>

    <!-- Central Emblem Background Layer (Darker Drop Layer) -->
    <path d="M 220 190 L 370 180 L 290 260 L 360 270 L 210 410 L 250 320 L 170 310 Z" fill="#111111" filter="url(#chrome3D)"/>

    <!-- Central Emblem Main Chrome (Stylized geometric bird/bolt) -->
    <path d="M 210 180 L 360 170 L 280 250 L 350 260 L 200 400 L 240 310 L 160 300 Z" fill="url(#chrome)" filter="url(#chrome3D)"/>
    
    <!-- Accent Highlight on Central Emblem -->
    <path d="M 225 190 L 290 185 L 260 230 Z" fill="#ffffff" opacity="0.4"/>
</svg>
